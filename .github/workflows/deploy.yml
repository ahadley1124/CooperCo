name: Deploy CooperCo

on:
  push:
    branches:
      - main

jobs:
  build-and-stage:
    name: Build and stage app
    runs-on: self-hosted

    env:
      DEPLOY_DIR: /github-runner/cooperco

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: taiki-e/install-action@trunk

      - name: Build frontend
        run: trunk build --release --config frontend/Trunk.toml

      - name: Build backend
        run: cargo build --release -p backend

      - name: Stage build outputs
        shell: bash
        run: |
          mkdir -p "$DEPLOY_DIR/frontend" "$DEPLOY_DIR/backend"
          rm -rf "$DEPLOY_DIR/frontend"/*
          cp -R frontend/dist/. "$DEPLOY_DIR/frontend/"
          cp target/release/backend "$DEPLOY_DIR/backend/backend"
          chmod +x "$DEPLOY_DIR/backend/backend"
